document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    --seafoam-pale: #b8d6cc;\n    --sand:         #d9c39a;\n    --sand-deep:    #b3925f;\n    --coral:        #c2553d;          /* sparing accent */\n    --rule:         #c9b88a;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: #2a3743;              /* viewer background only */\n    font-family: 'Lora', Georgia, serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* Sheet = one A4 page */\n  .sheet {\n    width: 210mm;\n    height: 297mm;\n    margin: 12mm auto;\n    background: var(--paper);\n    position: relative;\n    overflow: hidden;\n    box-shadow: 0 4px 18px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.04) inset;\n    /* subtle paper texture via layered gradients */\n    background-image:\n      radial-gradient(1200px 700px at 20% -10%, rgba(255,255,255,.55), transparent 60%),\n      radial-gradient(900px 600px at 110% 110%, rgba(217,195,154,.35), transparent 60%),\n      repeating-linear-gradient(0deg, rgba(146,118,72,.025) 0 1px, transparent 1px 3px),\n      repeating-linear-gradient(90deg, rgba(146,118,72,.02) 0 1px, transparent 1px 4px);\n  }\n\n  .sheet-inner {\n    position: absolute;\n    inset: 14mm 14mm 16mm 14mm;\n    display: flex;\n    flex-direction: column;\n  }\n\n  /* Decorative double frame */\n  .frame {\n    position: absolute;\n    inset: 8mm;\n    border: 1px solid var(--ocean-deep);\n    pointer-events: none;\n  }\n  .frame::before {\n    content: '';\n    position: absolute;\n    inset: 1.6mm;\n    border: 0.4pt solid var(--ocean-deep);\n    opacity: .55;\n  }\n  /* Corner ornaments */\n  .frame::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background:\n      /* top-left */\n      radial-gradient(circle at 0 0, var(--ocean-deep) 1.2mm, transparent 1.3mm) top    left   / 4mm 4mm no-repeat,\n      radial-gradient(circle at 100% 0, var(--ocean-deep) 1.2mm, transparent 1.3mm) top    right  / 4mm 4mm no-repeat,\n      radial-gradient(circle at 0 100%, var(--ocean-deep) 1.2mm, transparent 1.3mm) bottom left   / 4mm 4mm no-repeat,\n      radial-gradient(circle at 100% 100%, var(--ocean-deep) 1.2mm, transparent 1.3mm) bottom right / 4mm 4mm no-repeat;\n  }\n\n  /* ========== Masthead ========== */\n  .masthead {\n    text-align: center;\n    padding-top: 4mm;\n    padding-bottom: 6mm;\n    color: var(--ocean-deep);\n    position: relative;\n  }\n  .masthead .eyebrow {\n    font-family: 'Lora', serif;\n    font-style: italic;\n    font-weight: 400;\n    font-size: 10.5pt;\n    letter-spacing: .14em;\n    color: var(--ocean);\n    margin-bottom: 4mm;\n  }\n  .masthead .eyebrow .dot {\n    display: inline-block;\n    width: 5px; height: 5px; border-radius: 50%;\n    background: var(--coral);\n    vertical-align: middle;\n    margin: 0 8px 3px;\n  }\n  .masthead h1 {\n    font-family: 'Italiana', serif;\n    font-weight: 400;\n    font-size: 64pt;\n    line-height: .95;\n    letter-spacing: .015em;\n    margin: 0;\n    color: var(--ocean-deep);\n  }\n  .masthead h1 .amp {\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-weight: 500;\n    color: var(--coral);\n  }\n  .masthead .sub {\n    margin-top: 4mm;\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 500;\n    font-size: 12pt;\n    letter-spacing: .42em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n  .masthead .sub span { color: var(--ocean); margin: 0 .35em; }\n\n  /* Wave divider */\n  .wave-divider {\n    margin: 5mm auto 0;\n    width: 92%;\n    display: block;\n    color: var(--ocean);\n  }\n\n  /* ========== Section ========== */\n  .section { margin-top: 5mm; }\n  .section + .section { margin-top: 6mm; }\n\n  .section-head {\n    display: grid;\n    grid-template-columns: 1fr auto 1fr;\n    align-items: center;\n    gap: 4mm;\n    margin-bottom: 3mm;\n    color: var(--ocean-deep);\n  }\n  .section-head .line {\n    height: 1px;\n    background: linear-gradient(90deg, transparent, var(--rule) 30%, var(--rule));\n  }\n  .section-head .line.r {\n    background: linear-gradient(90deg, var(--rule), var(--rule) 70%, transparent);\n  }\n  .section-head h2 {\n    margin: 0;\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 600;\n    font-size: 13pt;\n    letter-spacing: .26em;\n    text-transform: uppercase;\n    text-align: center;\n    white-space: nowrap;\n  }\n  .section-head .ornament {\n    display: inline-block;\n    margin: 0 6px;\n    color: var(--seafoam);\n    transform: translateY(-2px);\n  }\n\n  .section-sub {\n    text-align: center;\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-weight: 500;\n    font-size: 9.5pt;\n    letter-spacing: .18em;\n    text-transform: uppercase;\n    color: var(--ocean);\n    margin: 1mm 0 1.2mm;\n  }\n  .section-sub::before, .section-sub::after {\n    content: '·';\n    margin: 0 8px;\n    color: var(--sand-deep);\n  }\n\n  /* ========== Item list ========== */\n  ul.items {\n    list-style: none;\n    padding: 0;\n    margin: 0;\n  }\n  ul.items li {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    align-items: start;\n    column-gap: 6px;\n    padding: 0.5mm 0;\n    font-family: 'Lora', serif;\n    font-size: 8.2pt;\n    line-height: 1.18;\n    color: var(--ink);\n    break-inside: avoid;\n  }\n  /* Page 2 — dense (lots of items w/ descriptions) */\n  .sheet.bigger ul.items li {\n    font-size: 10.8pt;\n    padding: 1.2mm 0;\n    line-height: 1.24;\n  }\n  .sheet.bigger ul.items .price { font-size: 11.6pt; }\n  .sheet.bigger ul.items .name em { font-size: 8.6pt; }\n  .sheet.bigger .section-head h2 { font-size: 15pt; }\n  .sheet.bigger .section-sub { font-size: 10pt; margin: 1mm 0 1.8mm; }\n  /* Page 3 — sparser (short drink lines) */\n  .sheet.bigger.dense ul.items li {\n    font-size: 10.4pt;\n    padding: 1.1mm 0;\n    line-height: 1.22;\n  }\n  .sheet.bigger.dense ul.items .price { font-size: 11.4pt; }\n  .sheet.bigger.dense ul.items .name em { font-size: 8.2pt; }\n  .sheet.bigger.dense .section-head h2 { font-size: 15pt; }\n  .sheet.bigger.dense .section-sub { font-size: 10pt; margin: 1mm 0 1.8mm; }\n  ul.items li + li {\n    border-top: 0.4pt dotted rgba(14,58,86,.35);\n  }\n  ul.items .name {\n    font-weight: 400;\n  }\n  ul.items .name em {\n    display: block;\n    font-style: italic;\n    font-weight: 400;\n    color: var(--ink-soft);\n    font-size: 7pt;\n    line-height: 1.18;\n    margin: 0.3mm 0 0;\n    letter-spacing: .01em;\n  }\n  ul.items .price {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 600;\n    font-size: 9pt;\n    color: var(--ocean-deep);\n    white-space: nowrap;\n    font-variant-numeric: tabular-nums;\n  }\n  ul.items .price.consult {\n    font-style: italic;\n    font-weight: 500;\n    color: var(--coral);\n    font-size: 10pt;\n  }\n\n  /* Two-column page-1 layout */\n  .page1-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 10mm;\n    align-items: start;\n    flex: 1;\n    min-height: 0;\n  }\n  .page1-grid > div { min-width: 0; }\n\n  /* Vertical separator between page 1 columns */\n  .page1-grid {\n    position: relative;\n  }\n  .page1-grid::before {\n    content: '';\n    position: absolute;\n    top: 4mm; bottom: 0;\n    left: 50%;\n    width: 0.4pt;\n    background: linear-gradient(180deg, transparent, var(--rule) 8%, var(--rule) 92%, transparent);\n  }\n\n  /* Multi-column lists for long sections */\n  .section.cols-2 > ul.items {\n    column-count: 2;\n    column-gap: 8mm;\n    column-rule: 0.4pt solid rgba(14,58,86,.18);\n  }\n  .section.cols-2 > ul.items li { break-inside: avoid; }\n\n  /* Section grid for arranging multiple sections side by side */\n  .section-row {\n    display: grid;\n    gap: 8mm;\n  }\n  .section-row.cols-2 { grid-template-columns: 1fr 1fr; }\n\n  /* 2x2 grid where row 1 = Prato Feito / Porções, row 2 = Caldos / Sobremesas (aligned) */\n  .section-grid-2x2 {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    column-gap: 8mm;\n    row-gap: 5mm;\n    align-items: start;\n  }\n\n  /* ========== Footer ========== */\n  .footer {\n    margin-top: auto;\n    padding-top: 4mm;\n    padding-bottom: 10mm;\n    text-align: center;\n    color: var(--ocean-deep);\n    font-family: 'Cormorant Garamond', serif;\n  }\n  .footer .quote {\n    font-style: italic;\n    font-weight: 500;\n    font-size: 13pt;\n    letter-spacing: .04em;\n  }\n  .footer .place {\n    margin-top: 2mm;\n    font-size: 10pt;\n    letter-spacing: .32em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n  .footer .place .pin { color: var(--coral); }\n  .footer .scallop {\n    display: block;\n    margin: 3mm auto 2mm;\n    color: var(--seafoam);\n  }\n\n  /* Page number / mark */\n  .page-mark {\n    position: absolute;\n    bottom: 6mm;\n    left: 0; right: 0;\n    text-align: center;\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 9pt;\n    letter-spacing: .4em;\n    text-transform: uppercase;\n    color: var(--ocean);\n    pointer-events: none;\n  }\n  .page-mark .num {\n    display: inline-block;\n    border: 0.4pt solid var(--ocean);\n    border-radius: 999px;\n    padding: 1.2mm 3mm;\n    background: var(--paper);\n  }\n\n  /* Side label (running) — vertical along right edge */\n  .side-mark {\n    position: absolute;\n    top: 0; bottom: 0;\n    right: 4mm;\n    width: 4mm;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    writing-mode: vertical-rl;\n    transform: rotate(180deg);\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 8.5pt;\n    letter-spacing: .55em;\n    text-transform: uppercase;\n    color: var(--seafoam);\n    white-space: nowrap;\n    pointer-events: none;\n  }\n\n  /* ========== Hero ornament (page 1) ========== */\n  .wordmark-wrap {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 2mm;\n    margin: 2mm 0 1mm;\n  }\n  .wordmark-pre {\n    font-family: 'Italiana', serif;\n    font-size: 19pt;\n    line-height: 1;\n    color: var(--ocean-deep);\n    letter-spacing: .04em;\n  }\n  .wordmark-logo {\n    display: block;\n    height: 38mm;\n    width: auto;\n    image-rendering: -webkit-optimize-contrast;\n  }\n\n  /* Print */\n  @media print {\n    html, body { background: white; }\n    .sheet {\n      margin: 0;\n      box-shadow: none;\n      page-break-after: always;\n    }\n    .sheet:last-child { page-break-after: auto; }\n    .twk-panel { display: none !important; }\n  }\n\n  /* Tweakable visibility */\n  [data-tw-hidden=\"true\"] { display: none !important; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n\n<!-- ============ PAGE 1 ============ -->\n<section class=\"sheet\" data-screen-label=\"01 Capa &amp; Petiscos / Pratos Principais\">\n  <div class=\"frame\"><\u002Fdiv>\n  <div class=\"side-mark\">Restaurante dos Guarás · São Luís — MA<\u002Fdiv>\n\n  <div class=\"sheet-inner\">\n\n    <!-- MASTHEAD -->\n    <header class=\"masthead\">\n      <div class=\"eyebrow\">Cozinha Maranhense<\u002Fdiv>\n\n      <div class=\"wordmark-wrap\">\n        <span class=\"wordmark-pre\">Restaurante&nbsp;dos<\u002Fspan>\n        <img src=\"5d8c493f-b4e7-48fb-a9f7-3da0d86ad31a\" alt=\"Guarás\" class=\"wordmark-logo\">\n      <\u002Fdiv>\n\n      <div class=\"sub\">Sabor Regional <span>◆<\u002Fspan> Frutos do Mar <span>◆<\u002Fspan> Comida Maranhense<\u002Fdiv>\n\n      <!-- Wave divider -->\n      <svg class=\"wave-divider\" viewBox=\"0 0 600 22\" preserveAspectRatio=\"none\" height=\"14\">\n        <path d=\"M0 11 Q 25 0, 50 11 T 100 11 T 150 11 T 200 11 T 250 11 T 300 11 T 350 11 T 400 11 T 450 11 T 500 11 T 550 11 T 600 11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Fpath>\n        <path d=\"M0 17 Q 25 6, 50 17 T 100 17 T 150 17 T 200 17 T 250 17 T 300 17 T 350 17 T 400 17 T 450 17 T 500 17 T 550 17 T 600 17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\".8\" opacity=\".55\"
